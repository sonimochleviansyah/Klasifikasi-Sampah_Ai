<!DOCTYPE html>
<html>

<head>

    <title>
        Klasifikasi Sampah AI
    </title>


    <style>
        body {

            font-family: Arial;
            background: #eef2f7;

        }


        .container {

            width: 600px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;

        }


        h1 {

            font-size: 35px;

        }


        button {

            background: #16a34a;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;

        }


        button:hover {

            background: #15803d;

        }


        img {

            margin-top: 20px;
            width: 300px;
            border-radius: 15px;

        }


        .result {

            font-size: 22px;
            margin-top: 20px;

        }
    </style>


</head>


<body>


    <div class="container">


        <h1>
            ♻️ Klasifikasi Sampah AI
        </h1>



        <form action="/predict" method="POST" enctype="multipart/form-data">


            <input type="file" name="file" required>


            <br><br>


            <button>
                Prediksi
            </button>


        </form>




        {% if prediction %}


        <div class="result">


            <h2>
                Hasil Prediksi:
            </h2>


            <h2>
                {{prediction}}
            </h2>


            <p>
                Confidence :
                {{confidence}} %
            </p>



            <img src="{{ url_for('static', filename=image_path) }}">


        </div>


        {% endif %}




    </div>


</body>

</html>
